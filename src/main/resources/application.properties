spring.application.name=user-management

spring.datasource.url=jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# SECURITY: [Layer 6] Never expose stack traces / internal errors to clients.
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# SECURITY: [Layer 3] Disable H2 console by default (enable only in local dev profiles).
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# SECURITY: [Layer 6] JWT settings for stateless session tokens.
security.jwt.issuer=https://user-management.local
security.jwt.audience=user-management-api
security.jwt.ttl=PT30M

# SECURITY: [Layer 6] Account lockout / brute-force protection defaults.
security.auth.maxFailedAttempts=5
security.auth.lockoutDuration=PT15M

# SECURITY: [Layer 6] Optional breached-password check via HIBP k-anonymity API.
security.password.hibp.enabled=false

# SECURITY: [Layer 6] Password reset tokens: time-limited + throttled.
security.password-reset.ttl=PT15M
security.password-reset.min-interval=PT1M

# SECURITY: [Layer 3] Upload limits (defense against payload inflation / DoS).
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# SECURITY: [Layer 6] Identity document policy.
security.identity-document.max-bytes=5242880

# SECURITY: [Layer 6] MFA challenge policy (OTP + throttling).
security.mfa.ttl=PT5M
security.mfa.min-interval=PT30S
security.mfa.max-attempts=5

# SECURITY: [Layer 2] External SMS gateway integration (REST). Disabled by default.
security.mfa.sms.enabled=false
security.mfa.sms.base-url=https://sms-gateway.local
security.mfa.sms.send-path=/api/send
security.mfa.sms.connect-timeout=PT5S
security.mfa.sms.request-timeout=PT5S

# SECURITY: [Layer 6] Directory lookup disabled by default (must be explicitly enabled + configured).
security.directory.enabled=false